function splitItems(str) {
  return String(str || "").split(/[|｜;；]/).map(s => s.trim()).filter(Boolean);
}

function parseCsvLine(line) {
  const result = [];
  let cur = "", inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === "\"") {
      if (inQuote && line[i+1] === "\"") { cur += "\""; i++; }
      else { inQuote = !inQuote; }
    } else if (ch === ',' && !inQuote) {
      result.push(cur.trim()); cur = "";
    } else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

function parseCsv(text) {
  const lines = text.trim().split("\n");
  const headers = parseCsvLine(lines[0]);
  return lines.slice(1).map(line => {
    const values = parseCsvLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = values[i] || ""; });
    return obj;
  });
}

function RadarChart({ m }) {
  const labels = ["音の開放度","音質調整","テンポキープ","ゴースト","グルーヴ"];
  const values = [m.openness, m.quality, m.tempo, m.ghost, m.groove];
  const n=5, W=200, H=180, cx=W/2, cy=H/2, r=60, ao=-Math.PI/2;
  const angle = i => ao+(2*Math.PI*i)/n;
  const pt = (i,v) => [cx+r*(v/5)*Math.cos(angle(i)), cy+r*(v/5)*Math.sin(angle(i))];
  const tip = i => [cx+r*Math.cos(angle(i)), cy+r*Math.sin(angle(i))];
  const grid = lv => Array.from({length:n},(_,i)=>pt(i,lv).join(",")).join(" ");
  const poly = values.map((v,i)=>pt(i,v).join(",")).join(" ");
  const li = [{i:0,dx:0,dy:-18,a:"middle"},{i:1,dx:10,dy:0,a:"start"},{i:2,dx:10,dy:0,a:"start"},{i:3,dx:-10,dy:0,a:"end"},{i:4,dx:-10,dy:0,a:"end"}];
  return (
    <svg width={W} height={H} viewBox={"0 0 "+W+" "+H}>
      {[1,2,3,4,5].map(l=><polygon key={l} points={grid(l)} fill="none" stroke="rgba(112,130,56,0.2)" strokeWidth="0.5"/>)}
      {Array.from({length:n},(_,i)=>{ const [x,y]=tip(i); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(112,130,56,0.3)" strokeWidth="0.5"/>; })}
      <polygon points={poly} fill="rgba(112,130,56,0.2)" stroke="#708238" strokeWidth="1.5"/>
      {values.map((v,i)=>{ const [x,y]=pt(i,v); return <circle key={i} cx={x} cy={y} r="2.5" fill="#708238"/>; })}
      {li.map(({i,dx,dy,a})=>{ const [tx,ty]=tip(i); return <text key={i} x={tx+dx} y={ty+dy} textAnchor={a} fontSize="9" fill="#6b4c30">{labels[i]}</text>; })}
      {values.map((v,i)=>{ const [x,y]=pt(i,v); return <text key={i} x={x} y={y-6} textAnchor="middle" fontSize="9" fontWeight="700" fill="#4B3621">{v}</text>; })}
    </svg>
  );
}

function MiniRadar({ m, size=48 }) {
  const values = [m.openness,m.quality,m.tempo,m.ghost,m.groove];
  const n=5, cx=size/2, cy=size/2, r=size*0.38, ao=-Math.PI/2;
  const pt = (i,v) => { const a=ao+(2*Math.PI*i)/n; return [cx+r*(v/5)*Math.cos(a),cy+r*(v/5)*Math.sin(a)]; };
  const tip = i => { const a=ao+(2*Math.PI*i)/n; return [cx+r*Math.cos(a),cy+r*Math.sin(a)]; };
  const grid = lv => Array.from({length:n},(_,i)=>pt(i,lv).join(",")).join(" ");
  const poly = values.map((v,i)=>pt(i,v).join(",")).join(" ");
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      {[1,2,3,4,5].map(l=><polygon key={l} points={grid(l)} fill="none" stroke="rgba(112,130,56,0.3)" strokeWidth="0.5"/>)}
      {Array.from({length:n},(_,i)=>{ const [x,y]=tip(i); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(112,130,56,0.2)" strokeWidth="0.5"/>; })}
      {m.diagnosisDate
        ? <polygon points={poly} fill="rgba(112,130,56,0.25)" stroke="#708238" strokeWidth="1.5"/>
        : <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.22} fill="#a09080">未</text>
      }
    </svg>
  );
}

      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setLessonMsg("✅ 送信しました！");

      setTimeout(() => { setLessonModal(null); setLessonMsg(""); autoFetch(); }, 1200);

      else setLoginErr("管理者パスワードが違います");
      return;
    }
    const norm = s => s.replace(/\s/g,"");
    const m = members.find(m => norm(m.name) === norm(selectedName));
    if (!m) { setLoginErr("メンバーが見つかりません"); return; }

                  <p style={{fontSize:9,color:C.moss}}>※ この端末のみ保存されます</p>
                </div>
                <textarea value={myMemo} onChange={e=>{setMyMemo(e.target.value);localStorage.setItem("memo_"+m.name,e.target.value);}}
                  placeholder="レッスンや練習会の記録や疑問点を入力できます"
                  style={{width:"100%",background:"rgba(240,235,226,0.6)",border:"1px solid "+C.border,borderRadius:8,padding:8,fontSize:13,color:C.choco,resize:"none",height:70,boxSizing:"border-box"}}/>
              </div>
            </div>
          </div>
        </div>

        {/* DANiLOコメント */}
        <div style={{background:"rgba(255,255,255,0.8)",border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:10}}>
            <p style={{fontSize:13,color:C.label,fontWeight:500}}>💬 DANiLO・講師陣からのコメント</p>
            <p style={{fontSize:10,color:C.moss}}>※ 下にスクロールで過去のログも見られます</p>
          </div>
          <div style={{maxHeight:"6.4em",overflowY:"auto",lineHeight:1.6}}>
            {m.challenge
              ? splitItems(m.challenge).map((line,i) => <p key={i} style={{fontSize:14,color:C.choco,lineHeight:1.6,marginBottom:4}}>{line}</p>)
              : <p style={{fontSize:14,color:"#a09080",fontStyle:"italic"}}>−</p>
            }
          </div>
        </div>

        {/* メインカリキュラム */}
        <div style={{background:"rgba(255,255,255,0.8)",border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px"}}>
          <p style={{fontSize:13,color:C.label,marginBottom:14,fontWeight:500}}>📚 メインカリキュラム進捗</p>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
            {CURRICULUM.map((title,i)=>{
              const done = i < m.completedLevels;
              return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:done?"rgba(112,130,56,0.1)":"rgba(0,0,0,0.03)",borderRadius:10,padding:"10px 14px"}}>
                  <span style={{fontSize:16,flexShrink:0}}>{done?"✅":"🔒"}</span>
                  <span style={{fontSize:13,color:done?C.choco:C.label,fontWeight:done?500:400}}>{title}</span>
                </div>
              );
            })}
          </div>
          <a href="https://www.gudadrumjapan.com/tchng" target="_blank" rel="noreferrer" style={BTN_STYLE}>
            メインカリキュラムを受講する
          </a>
        </div>



      </div>
    </div>
  );
}


ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
