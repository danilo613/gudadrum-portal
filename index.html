function splitItems(str) {
  return String(str || "").split(/[|｜;；,，]/).map(s => s.trim()).filter(Boolean);
}

function parseCsvLine(line) {
  const result = [];
  let cur = "", inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else { inQuote = !inQuote; }
    } else if (ch === ',' && !inQuote) {
      result.push(cur.trim()); cur = "";
    } else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

function parseCsv(text) {
  const lines = text.trim().split("\n");
  const headers = parseCsvLine(lines[0]);
  return lines.slice(1).map(line => {
    const values = parseCsvLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = values[i] || ""; });
    return obj;
  });
}

function RadarChart({ m }) {
  const labels = ["音の開放度","音質調整","テンポキープ","ゴースト","グルーヴ"];
  const values = [m.openness, m.quality, m.tempo, m.ghost, m.groove];
  const n=5, W=240, H=210, cx=W/2, cy=H/2, r=60, ao=-Math.PI/2;
  const angle = i => ao+(2*Math.PI*i)/n;
  const pt = (i,v) => [cx+r*(v/5)*Math.cos(angle(i)), cy+r*(v/5)*Math.sin(angle(i))];
  const tip = i => [cx+r*Math.cos(angle(i)), cy+r*Math.sin(angle(i))];
  const grid = lv => Array.from({length:n},(_,i)=>pt(i,lv).join(",")).join(" ");
  const poly = values.map((v,i)=>pt(i,v).join(",")).join(" ");
  const li = [{i:0,dx:0,dy:-14,a:"middle"},{i:1,dx:14,dy:4,a:"start"},{i:2,dx:14,dy:-4,a:"start"},{i:3,dx:-14,dy:-4,a:"end"},{i:4,dx:-14,dy:4,a:"end"}];
  return (
    <svg width={W} height={H} viewBox={"0 0 "+W+" "+H}>
      {[1,2,3,4,5].map(l=><polygon key={l} points={grid(l)} fill="none" stroke="rgba(112,130,56,0.2)" strokeWidth="0.5"/>)}
      {Array.from({length:n},(_,i)=>{ const [x,y]=tip(i); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(112,130,56,0.3)" strokeWidth="0.5"/>; })}
      <polygon points={poly} fill="rgba(112,130,56,0.2)" stroke="#708238" strokeWidth="1.5"/>
      {values.map((v,i)=>{ const [x,y]=pt(i,v); return <circle key={i} cx={x} cy={y} r="2.5" fill="#708238"/>; })}
      {li.map(({i,dx,dy,a})=>{ const [tx,ty]=tip(i); return <text key={i} x={tx+dx} y={ty+dy} textAnchor={a} fontSize="9" fill="#6b4c30">{labels[i]}</text>; })}
      {values.map((v,i)=>{ const [x,y]=pt(i,v); return <text key={i} x={x} y={y-6} textAnchor="middle" fontSize="9" fontWeight="700" fill="#4B3621">{v}</text>; })}
    </svg>
  );
}

function MiniRadar({ m, size=48 }) {
  const values = [m.openness,m.quality,m.tempo,m.ghost,m.groove];
  const n=5, cx=size/2, cy=size/2, r=size*0.38, ao=-Math.PI/2;
  const pt = (i,v) => { const a=ao+(2*Math.PI*i)/n; return [cx+r*(v/5)*Math.cos(a),cy+r*(v/5)*Math.sin(a)]; };
  const tip = i => { const a=ao+(2*Math.PI*i)/n; return [cx+r*Math.cos(a),cy+r*Math.sin(a)]; };
  const grid = lv => Array.from({length:n},(_,i)=>pt(i,lv).join(",")).join(" ");
  const poly = values.map((v,i)=>pt(i,v).join(",")).join(" ");
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      {[1,2,3,4,5].map(l=><polygon key={l} points={grid(l)} fill="none" stroke="rgba(112,130,56,0.3)" strokeWidth="0.5"/>)}
      {Array.from({length:n},(_,i)=>{ const [x,y]=tip(i); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(112,130,56,0.2)" strokeWidth="0.5"/>; })}
      {m.diagnosisDate
        ? <polygon points={poly} fill="rgba(112,130,56,0.25)" stroke="#708238" strokeWidth="1.5"/>
        : <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.22} fill="#a09080">未</text>
      }
    </svg>
  );
}

  async function postLesson(overwrite) {
    if (!lessonValue.trim()) { setLessonMsg("内容を入力してください"); return; }
    setLessonMsg("送信中...");
    try {
      const today = new Date();
      const dateStr = today.getFullYear() + "/" + (today.getMonth()+1) + "/" + today.getDate();
      const sender = isInstructor ? (instructorName || "講師") : "DANiLO";

      // スケジュールコメントの場合
      if (lessonColumn.startsWith("__sched__")) {
        const parts = lessonColumn.replace("__sched__","").split("__");
        const schedDate = parts[0];
        const commentText = dateStr + " " + sender + ": " + lessonValue;
        const data = await gasWrite({action:"addschedulecomment", name:lessonModal, date:schedDate, comment:commentText});
        if (data.error) throw new Error(data.error);
        setLessonMsg("✅ 送信完了！");
        setLessonValue("");
        setTimeout(() => { setLessonModal(null); setLessonMsg(""); fetchSchedules(); }, 1500);
        return;
      }

      // lessonColumnが意図しない列になっていたら課題にフォールバック
      const allowedColumns = ["課題","強み","目標","段階","受講済み段階","Yamashita Noriko強み","hiroko強み","灯音強み"];
      const safeColumn = allowedColumns.includes(lessonColumn) ? lessonColumn : "課題";
      const autoOverwrite = ["強み","目標","段階","受講済み段階","Yamashita Noriko強み","hiroko強み","灯音強み"].includes(safeColumn);
      const formattedValue = overwrite ? lessonValue : dateStr + " " + sender + ": " + lessonValue;
      let targetColumn = safeColumn;
      if (isInstructor && safeColumn === "課題") {
        const colMap = {"Yamashita Noriko":"Yamashita Norikoコメント", "hiroko":"hirokoコメント", "灯音(to•o•n)":"灯音コメント"};
        targetColumn = colMap[instructorName] || "課題";
      }
      const data = await gasWrite({action:"write", name:lessonModal, column:targetColumn, value:formattedValue, overwrite:(overwrite||autoOverwrite)?"true":"false"});
      if (data.error) throw new Error(data.error);
      setLessonMsg("✅ 送信完了！");
      setLessonValue("");
      setTimeout(() => { setLessonModal(null); setLessonMsg(""); autoFetch(); }, 1500);
    } catch(e) { setLessonMsg("❌ エラー: " + e.message); }
  }

  async function postDiagnosis() {
    const date = diagScores.date || new Date().toISOString().split("T")[0];
    const cols = ["音の開放度","音質調整","テンポキープ","ゴースト","グルーヴ","診断日"];
    const vals = [diagScores.openness, diagScores.quality, diagScores.tempo, diagScores.ghost, diagScores.groove, date];
    if (diagScores.daniloMsg && diagScores.daniloMsg.trim()) { cols.push("診断結果"); vals.push(diagScores.daniloMsg.trim()); }
    if (diagScores.diagSong && diagScores.diagSong.trim()) { cols.push("診断楽曲"); vals.push(diagScores.diagSong.trim()); }
    setLessonMsg("送信中...");
    try {
      const data = await gasWrite({action:"writeMulti", name:lessonModal, columns:cols.join(","), values:vals.join(",")});
      if (data.error) throw new Error(data.error);
      setLessonMsg("✅ 送信完了！");
      setTimeout(() => { setLessonModal(null); setLessonMsg(""); autoFetch(); }, 1500);
    } catch(e) { setLessonMsg("❌ エラー: " + e.message); }
  }

                    {isInstructor && (
                      <select value={instructorName} onChange={e=>setInstructorName(e.target.value)}
                        style={{width:"100%",background:"#fff",border:"1px solid "+C.border,borderRadius:8,padding:"5px 8px",fontSize:12,color:C.choco,cursor:"pointer",marginBottom:8}}>
                        <option value="">-- 講師を選択 --</option>
                        {["Yamashita Noriko","hiroko","灯音(to•o•n)"].map(n=><option key={n} value={n}>{n}</option>)}
                      </select>
                    )}
                    {isEditingChal ? (
                      <div>
                        <textarea value={editValChal} onChange={e=>setPastSchedOpen(p=>({...p,challengeval:e.target.value}))}
                          style={{width:"100%",background:"#fff",border:"1px solid "+C.border,borderRadius:8,padding:"8px",fontSize:12,color:C.choco,resize:"vertical",minHeight:80,marginBottom:6}}/>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>setPastSchedOpen(p=>({...p,[editKey]:false}))}
                            style={{flex:1,padding:"5px",borderRadius:6,border:"1px solid "+C.border,background:"transparent",color:C.label,fontSize:11,cursor:"pointer"}}>キャンセル</button>
                          <button onClick={async()=>{
                            const today=new Date();
                            const ds=today.getFullYear()+"/"+(today.getMonth()+1)+"/"+today.getDate();
                            const val=ds+" "+adminName+": "+editValChal;
                            const res=await fetch("/api/gas?"+new URLSearchParams({action:"write",name:m.name,column:targetCol,value:val,overwrite:"true"}));
                            const data=await res.json();
                            if(!data.error){autoFetch();setPastSchedOpen(p=>({...p,[editKey]:false}));}
                          }} style={{flex:2,padding:"5px",borderRadius:6,border:"none",background:"linear-gradient(135deg,#b8c86a,#8a9a3a)",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>保存する</button>
                        </div>
                      </div>
                    ) : (
                      <button onClick={()=>setPastSchedOpen(p=>({...p,[editKey]:true,challengeval:currentVal||""}))}
                        style={{fontSize:11,color:C.olive,background:"transparent",border:"1px solid "+C.olive,borderRadius:6,padding:"3px 10px",cursor:"pointer",fontWeight:600}}>
                        {currentVal?"✏️ コメントを編集":"💬 コメントを書く"}
                      </button>
                    )}
                  </div>
                );
              })()}
            </div>
          )}
        </div>

        {/* メインカリキュラム */}
        <div style={{background:"rgba(255,255,255,0.8)",border:"1px solid "+C.border,borderRadius:14,overflow:"hidden"}}>
          <button onClick={()=>setCurriculumOpen(!curriculumOpen)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",background:"transparent",border:"none",cursor:"pointer"}}>
            <span style={{fontSize:13,color:C.label,fontWeight:700}}>📚 メインカリキュラム進捗</span>
            <span style={{fontSize:12,color:C.olive,display:"inline-block",transform:curriculumOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▼</span>
          </button>
          {curriculumOpen && <div style={{borderTop:"1px solid "+C.border,padding:"14px 16px"}}>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
            {CURRICULUM.map((item,i)=>{
              const done = i < m.completedLevels;
              return (
                <div key={i} style={{background:done?"rgba(112,130,56,0.1)":"rgba(0,0,0,0.03)",borderRadius:10,padding:"10px 14px"}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                    <span style={{fontSize:16,flexShrink:0,marginTop:1}}>{done?"✅":"🔒"}</span>
                    <span style={{fontSize:13,color:done?C.choco:C.label,fontWeight:done?500:400,wordBreak:"keep-all",lineHeight:1.5}}>{item.title}</span>
                  </div>
                  {done && item.url && (
                    <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,marginLeft:24}}>
                      <a href={item.url} target="_blank" rel="noreferrer"
                        style={{padding:"4px 10px",borderRadius:8,background:"linear-gradient(135deg,#b8c86a,#8a9a3a)",color:"#fff",fontSize:11,fontWeight:700,textDecoration:"none"}}>
                        ▶ 動画のまとめ
                      </a>
                      {item.password && (
                        <span style={{fontSize:11,color:C.label,background:"rgba(112,130,56,0.1)",padding:"4px 8px",borderRadius:6}}>
                          🔑 {item.password}
                        </span>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <a href="https://www.gudadrumjapan.com/tchng" target="_blank" rel="noreferrer" style={BTN_STYLE}>
            メインカリキュラムを受講する
          </a>
          </div>}
        </div>

        {/* フィードバックボタン */}
        <div style={{marginTop:16,marginBottom:8}}>
          <button onClick={()=>setFeedbackOpen(!feedbackOpen)}
            style={{width:"100%",padding:"12px",borderRadius:12,border:"1px solid "+C.border,background:"rgba(255,255,255,0.6)",color:C.label,fontSize:13,fontWeight:600,cursor:"pointer",textAlign:"center"}}>
            💬 アプリへのフィードバックを送る
          </button>
          {feedbackOpen && (
            <div style={{background:"rgba(255,255,255,0.9)",border:"1px solid "+C.border,borderRadius:12,padding:16,marginTop:8}}>
              <p style={{fontSize:12,color:C.label,marginBottom:12,lineHeight:1.6}}>
                アプリの使い心地や改善のご要望などをDANiLOに直接お届けします。お気軽にどうぞ！
              </p>
              <input value={feedbackName} onChange={e=>setFeedbackName(e.target.value)}
                placeholder="お名前（任意）"
                style={{width:"100%",background:"#fff",border:"1px solid "+C.border,borderRadius:8,padding:"8px 10px",fontSize:13,color:C.choco,marginBottom:8}}/>
              <textarea value={feedbackMsg} onChange={e=>setFeedbackMsg(e.target.value)}
                placeholder="フィードバック内容をご記入ください"
                style={{width:"100%",background:"#fff",border:"1px solid "+C.border,borderRadius:8,padding:"8px 10px",fontSize:13,color:C.choco,resize:"none",height:100,marginBottom:8}}/>
              {feedbackStatus && <p style={{fontSize:12,color:feedbackStatus.startsWith("✅")?C.olive:"#a04030",marginBottom:8}}>{feedbackStatus}</p>}
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setFeedbackOpen(false);setFeedbackStatus("");}}
                  style={{flex:1,padding:"8px",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.label,fontSize:12,cursor:"pointer"}}>キャンセル</button>
                <button onClick={sendFeedback}
                  style={{flex:2,padding:"8px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#b8c86a,#8a9a3a)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>送信する</button>
              </div>
            </div>
          )}
        </div>



      </div>
    </div>
  );
}

    ReactDOM.render(React.createElement(App), document.getElementById('root'));
  </script>
</body>
</html>
