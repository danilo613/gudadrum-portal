function splitItems(str) {
  return String(str || "").split(/[|｜;；,，]/).map(s => s.trim()).filter(Boolean);
}

function parseCsvLine(line) {
  const result = [];
  let cur = "", inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else { inQuote = !inQuote; }
    } else if (ch === ',' && !inQuote) {
      result.push(cur.trim()); cur = "";
    } else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

function parseCsv(text) {
  const lines = text.trim().split("\n");
  const headers = parseCsvLine(lines[0]);
  return lines.slice(1).map(line => {
    const values = parseCsvLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = values[i] || ""; });
    return obj;
  });
}

function loadSavedMembers() {
  try {
    const cfg = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (cfg && cfg.jsonData) {
      const rows = JSON.parse(cfg.jsonData);
      const parsed = rows.map(rowToMember).filter(m => m.name);
      if (parsed.length > 0) return parsed;
    }
  } catch(e) {}
  return null;
}

function RadarChart({ m }) {
  const labels = ["音の開放度","音質調整","テンポキープ","ゴースト","グルーヴ"];
  const values = [m.openness, m.quality, m.tempo, m.ghost, m.groove];
  const n=5, W=240, H=210, cx=W/2, cy=H/2, r=60, ao=-Math.PI/2;
  const angle = i => ao+(2*Math.PI*i)/n;
  const pt = (i,v) => [cx+r*(v/100)*Math.cos(angle(i)), cy+r*(v/100)*Math.sin(angle(i))];
  const tip = i => [cx+r*Math.cos(angle(i)), cy+r*Math.sin(angle(i))];
  const grid = lv => Array.from({length:n},(_,i)=>pt(i,lv).join(",")).join(" ");
  const poly = values.map((v,i)=>pt(i,v).join(",")).join(" ");
  const li = [{i:0,dx:0,dy:-14,a:"middle"},{i:1,dx:14,dy:4,a:"start"},{i:2,dx:14,dy:-4,a:"start"},{i:3,dx:-14,dy:-4,a:"end"},{i:4,dx:-14,dy:4,a:"end"}];
  return (
    <svg width={W} height={H} viewBox={"0 0 "+W+" "+H}>
      {[20,40,60,80,100].map(l=><polygon key={l} points={grid(l)} fill="none" stroke="rgba(112,130,56,0.2)" strokeWidth="0.5"/>)}
      {Array.from({length:n},(_,i)=>{ const [x,y]=tip(i); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(112,130,56,0.3)" strokeWidth="0.5"/>; })}
      <polygon points={poly} fill="rgba(112,130,56,0.2)" stroke="#708238" strokeWidth="1.5"/>
      {values.map((v,i)=>{ const [x,y]=pt(i,v); return <circle key={i} cx={x} cy={y} r="2.5" fill="#708238"/>; })}
      {li.map(({i,dx,dy,a})=>{ const [tx,ty]=tip(i); return <text key={i} x={tx+dx} y={ty+dy} textAnchor={a} fontSize="9" fill="#6b4c30">{labels[i]}</text>; })}
      {values.map((v,i)=>{ const [x,y]=pt(i,v); return <text key={i} x={x} y={y-6} textAnchor="middle" fontSize="9" fontWeight="700" fill="#4B3621">{v}</text>; })}
    </svg>
  );
}

function MiniRadar({ m, size=48 }) {
  const values = [m.openness,m.quality,m.tempo,m.ghost,m.groove];
  const n=5, cx=size/2, cy=size/2, r=size*0.38, ao=-Math.PI/2;
  const pt = (i,v) => { const a=ao+(2*Math.PI*i)/n; return [cx+r*(v/100)*Math.cos(a),cy+r*(v/100)*Math.sin(a)]; };
  const tip = i => { const a=ao+(2*Math.PI*i)/n; return [cx+r*Math.cos(a),cy+r*Math.sin(a)]; };
  const grid = lv => Array.from({length:n},(_,i)=>pt(i,lv).join(",")).join(" ");
  const poly = values.map((v,i)=>pt(i,v).join(",")).join(" ");
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      {[20,40,60,80,100].map(l=><polygon key={l} points={grid(l)} fill="none" stroke="rgba(112,130,56,0.3)" strokeWidth="0.5"/>)}
      {Array.from({length:n},(_,i)=>{ const [x,y]=tip(i); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(112,130,56,0.2)" strokeWidth="0.5"/>; })}
      {m.diagnosisDate
        ? <polygon points={poly} fill="rgba(112,130,56,0.25)" stroke="#708238" strokeWidth="1.5"/>
        : <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.22} fill="#a09080">未</text>
      }
    </svg>
  );
}

          var src=actxRef.current.createBufferSource(); src.buffer=bufs2Ref.current[c];
          var g=actxRef.current.createGain(); g.gain.value=0.6;
          src.connect(g); g.connect(actxRef.current.destination); src.start(0);
        }
        if(R2[c]&&R2[c][s]&&bufs2Ref.current[c]){
          var src2=actxRef.current.createBufferSource(); src2.buffer=bufs2Ref.current[c];
          var g2=actxRef.current.createGain(); g2.gain.value=0.6;
          src2.connect(g2); g2.connect(actxRef.current.destination); src2.start(0);
        }
      });
    }
    COLORS.forEach(function(c){if(L[c]&&L[c][s]){playSound(c);flashDot(c,"左");fired[c]=true;}});
    COLORS.forEach(function(c){if(R[c]&&R[c][s]){playSound(c);flashDot(c,fired[c]?"両":"右");fired[c]=true;}});
    if(metroOnRef.current){
      var m=metroModeRef.current;
      var doAcc=s12===0&&metroAccentRef.current;
      var spb=subdivRef.current==="16th"?16:12;
      var s12b=stepRef.current===0?0:(stepRef.current-1)%spb; // 現在のs12
      if(subdivRef.current==="16th"){
        if(m===4&&s12%4===0)woodClick(doAcc);
        else if(m===8&&s12%2===0)woodClick(doAcc);
        else if(m==="8u"&&s12%2!==0)woodClick(doAcc);
      } else {
        if(m===4&&s12%3===0)woodClick(doAcc);
        else if(m===3)woodClick(doAcc);
      }
    }
  }

  function toggleCell2(side,color,idx){
    if(!canEdit)return;
    var setter=side==="left"?setLeft2:setRight2;
    var willBeOn;
    var totalSteps2=Math.max(2,Math.min(parseInt(bars)||8,32))*SPB;
    setter(function(prev){
      var p=Object.assign({},prev);
      if(!p[color]) p[color]=new Array(totalSteps2).fill(0);
      else p[color]=prev[color].slice();
      p[color][idx]^=1;
      willBeOn=p[color][idx]===1;
      return p;
    });
    setTimeout(function(){
      if(willBeOn) initAudio(function(){ playSound2(color); });
    },0);
  }

  function toggleCell(side,color,idx){
    if(!canEdit)return;
    var setter=side==="left"?setLeft:setRight;
    var willBeOn;
    setter(function(prev){
      var p=Object.assign({},prev);p[color]=prev[color].slice();
      p[color][idx]^=1;
      willBeOn=p[color][idx]===1;
      return p;
    });
    // ONになった時だけ音を鳴らす
    setTimeout(function(){
      if(willBeOn) {
        setHighlightColor(color);
        setTimeout(function(){ setHighlightColor(null); }, 300);
        initAudio(function(){ playSound(color); });
      }
    }, 0);
  }

  function initAudio(cb){
    if(actxRef.current){if(cb)cb();return;}
    var Ctx=window.AudioContext||window.webkitAudioContext;
    actxRef.current=new Ctx();
    var keys=Object.keys(METRO_SOUNDS_B64);var done=0;
    keys.forEach(function(k){
      var bin=atob(METRO_SOUNDS_B64[k]),arr=new Uint8Array(bin.length);
      for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
      actxRef.current.decodeAudioData(arr.buffer,function(buf){
        bufsRef.current['metro_'+k]=buf;done++;
        if(done===keys.length){
          // 1台目の音源
          var soundUrls=getSoundUrls(scoreId, scoreId==="iridescence"?soundType:(scoreId==="aoi"?"arcane":null));
          var skeys=Object.keys(soundUrls);
          // 2台目の音源
          var soundUrls2=instrument2?getSoundUrls(scoreId,instrument2):{};
          var skeys2=Object.keys(soundUrls2);
          var total=skeys.length+skeys2.length;
          if(total===0){if(cb)cb();return;}
          var loaded=0;
          function onLoad(){loaded++;if(loaded===total&&cb)cb();}
          skeys.forEach(function(sk){
            fetch(soundUrls[sk]).then(function(r){return r.arrayBuffer();})
              .then(function(b){return actxRef.current.decodeAudioData(b);})
              .then(function(ab){bufsRef.current[sk]=ab;onLoad();})
              .catch(function(){onLoad();});
          });
          skeys2.forEach(function(sk2){
            fetch(soundUrls2[sk2]).then(function(r){return r.arrayBuffer();})
              .then(function(b){return actxRef.current.decodeAudioData(b);})
              .then(function(ab){bufs2Ref.current[sk2]=ab;onLoad();})
              .catch(function(){onLoad();});
          });
        }
      },function(){done++;if(done===keys.length&&cb)cb();});
    });
  }

  function playSound(c){
    var actx=actxRef.current,bufs=bufsRef.current;
    if(!actx||!bufs[c])return;
    var s=actx.createBufferSource();s.buffer=bufs[c];
    var g=actx.createGain();g.gain.value=0.6;
    s.connect(g);g.connect(actx.destination);s.start(0);
  }
  function playSound2(c){
    var actx=actxRef.current,bufs2=bufs2Ref.current;
    if(!actx||!bufs2[c])return;
    var s=actx.createBufferSource();s.buffer=bufs2[c];
    var g=actx.createGain();g.gain.value=0.6;
    s.connect(g);g.connect(actx.destination);s.start(0);
  }

  function woodClick(accent, atTime){
    var actx=actxRef.current,bufs=bufsRef.current;if(!actx)return;
    var key=(accent&&bufs['metro_accent'])?'metro_accent':'metro_click';
    if(!bufs[key])return;
    var s=actx.createBufferSource();s.buffer=bufs[key];
    var g=actx.createGain();g.gain.value=metroVolRef.current;
    s.connect(g);g.connect(actx.destination);
    s.start(atTime||actx.currentTime);
  }

  function tick(){
    var s=stepRef.current,L=leftRef.current,R=rightRef.current,s12=s%SPB;
    var spbNow2=subdivRef.current==="16th"?16:12;
    var totalNow2=barsRef.current*spbNow2;
    if(s===0) console.log("tick start: bars=",barsRef.current,"spb=",spbNow2,"total=",totalNow2);
    if(s >= totalNow2-2) console.log("tick near end: s=",s,"total=",totalNow2);
    var ms=Math.round((60/bpmRef.current/(subdivRef.current==="16th"?4:3))*1000);
    if(dimRef.current)clearTimeout(dimRef.current);
    dimRef.current=setTimeout(dimAll,Math.round(ms*0.75));
    setCurStep(s);
    var spbNow = subdivRef.current==="16th"?16:12;
    var totalNow = barsRef.current * spbNow;
    var nextStep = (s+1) % totalNow;
    stepRef.current = nextStep;
    // 1周完了
    if(nextStep === 0) {
      if(onLoopCompleteRef.current) {
        var cont=onLoopCompleteRef.current();
        if(!cont){ doStop(); return; }
      } else if(onSectionEndRef.current) {
        onSectionEndRef.current();
      }
    }
    var fired={};
    // 2台目の音を鳴らす
    if(instrument2){
      var L2=left2Ref?left2Ref.current:{}; var R2=right2Ref?right2Ref.current:{};
      COLORS2.forEach(function(c){
        if(L2[c]&&L2[c][s]&&bufs2Ref.current[c]){
          var src=actxRef.current.createBufferSource(); src.buffer=bufs2Ref.current[c];
          var g=actxRef.current.createGain(); g.gain.value=0.6;
          src.connect(g); g.connect(actxRef.current.destination); src.start(0);
        }
        if(R2[c]&&R2[c][s]&&bufs2Ref.current[c]){
          var src2=actxRef.current.createBufferSource(); src2.buffer=bufs2Ref.current[c];
          var g2=actxRef.current.createGain(); g2.gain.value=0.6;
          src2.connect(g2); g2.connect(actxRef.current.destination); src2.start(0);
        }
      });
    }
    COLORS.forEach(function(c){if(L[c]&&L[c][s]){playSound(c);flashDot(c,"左");fired[c]=true;}});
    COLORS.forEach(function(c){if(R[c]&&R[c][s]){playSound(c);flashDot(c,fired[c]?"両":"右");fired[c]=true;}});
    if(metroOnRef.current){
      var m=metroModeRef.current;
      var doAcc=s12===0&&metroAccentRef.current;
      var spb=subdivRef.current==="16th"?16:12;
      var s12b=stepRef.current===0?0:(stepRef.current-1)%spb; // 現在のs12
      if(subdivRef.current==="16th"){
        if(m===4&&s12%4===0)woodClick(doAcc);
        else if(m===8&&s12%2===0)woodClick(doAcc);
        else if(m==="8u"&&s12%2!==0)woodClick(doAcc);
      } else {
        if(m===4&&s12%3===0)woodClick(doAcc);
        else if(m===3)woodClick(doAcc);
      }
    }
  }

  function doStart(){
    if(iidRef.current)clearInterval(iidRef.current);
    iidRef.current=setInterval(tick,Math.round((60/bpmRef.current/(subdivRef.current==="16th"?4:3))*1000));
  }

  function doStop(){
    if(iidRef.current){clearInterval(iidRef.current);iidRef.current=null;}
    if(dimRef.current){clearTimeout(dimRef.current);dimRef.current=null;}
    dimAll();stepRef.current=startStepRef.current;setCurStep(-1);setPlaying(false);
  }

  function handleBpm(v){setBpm(v);bpmRef.current=v;if(playing)doStart();}

  function toggleCell2(side,color,idx){
    if(!canEdit)return;
    var setter=side==="left"?setLeft2:setRight2;
    var willBeOn;
    var totalSteps2=Math.max(2,Math.min(parseInt(bars)||8,32))*SPB;
    setter(function(prev){
      var p=Object.assign({},prev);
      if(!p[color]) p[color]=new Array(totalSteps2).fill(0);
      else p[color]=prev[color].slice();
      p[color][idx]^=1;
      willBeOn=p[color][idx]===1;
      return p;
    });
    setTimeout(function(){
      if(willBeOn) initAudio(function(){ playSound2(color); });
    },0);
  }

  function toggleCell(side,color,idx){
    if(!canEdit)return;
    var setter=side==="left"?setLeft:setRight;
    var willBeOn;
    setter(function(prev){
      var p=Object.assign({},prev);p[color]=prev[color].slice();
      p[color][idx]^=1;
      willBeOn=p[color][idx]===1;
      return p;
    });
    // ONになった時だけ音を鳴らす
    setTimeout(function(){
      if(willBeOn) {
        setHighlightColor(color);
        setTimeout(function(){ setHighlightColor(null); }, 300);
        initAudio(function(){ playSound(color); });
      }
    }, 0);
  }

    var stepH = CELL+GAP;
    var rows = [];
    for(var i=0;i<SPB;i++){
      var s=barIdx*SPB+i;
      var ibs=i===0, ib=(subdiv==="16th"?i%4===0:i%3===0)&&i!==0;
      var cur=s===curStep;
      var isStart=s===startStepRef.current;
      // 帯の色とサイズ
      var band=null;
      if(ibs){
        // 小節頭: 濃いグレーの太い横帯
        band=<div style={{position:"absolute",top:0,left:0,right:0,height:"100%",background:isStart?"#E74C3C":cur?"#505050":"#909090",borderRadius:2}}/>;
      } else if(ib){

              position:"relative",zIndex:2,
            }}
          />
        );
      }
      return <div style={{display:"flex",flexDirection:"column"}}>{cells}</div>;
    }
  }

  // 1小節ブロック
  function renderBar(barIdx){
    var isStart=startBar===barIdx;
    var stepH=CELL+GAP;
    var nCols=canEdit?COLORS.length:1;
    var sideW=nCols*(CELL+GAP);
    var beatW=lrOn?14:0;
    var totalW=lrOn?sideW+beatW+sideW:sideW;

    // 帯リスト（後ろに配置）
    var bands=[];
    for(var i=0;i<SPB;i++){
      var s=barIdx*SPB+i;
      var ibs_b=i===0;
      var ib_b=(subdiv==="16th"?i%4===0:i%3===0)&&i!==0;
      var i8_b=subdiv==="16th"&&i%2===0&&i%4!==0;
      var cur_b=s===curStep;
      var isRowStart=s===startStepRef.current;
      if(ibs_b){
        bands.push(<div key={"b"+i} style={{
          position:"absolute",left:0,right:0,
          top:i*stepH,height:stepH-GAP,
          background:isRowStart?"rgba(231,76,60,0.25)":cur_b?"rgba(0,0,0,0.2)":"rgba(0,0,0,0.12)",
          borderRadius:2,pointerEvents:"none",zIndex:0,
        }}/>);
      } else if(ib_b){
        bands.push(<div key={"b"+i} style={{
          position:"absolute",left:0,right:0,
          top:i*stepH+Math.floor(stepH*0.3),height:Math.floor(stepH*0.4),
          background:isRowStart?"rgba(231,76,60,0.15)":cur_b?"rgba(0,0,0,0.15)":"rgba(0,0,0,0.07)",
          borderRadius:1,pointerEvents:"none",zIndex:0,
        }}/>);
      } else if(i8_b){
        bands.push(<div key={"b"+i} style={{
          position:"absolute",left:"50%",transform:"translateX(-50%)",
          top:i*stepH+Math.floor(stepH*0.35),
          width:4,height:4,borderRadius:"50%",
          background:cur_b?"rgba(0,0,0,0.4)":"rgba(0,0,0,0.15)",
          pointerEvents:"none",zIndex:0,
        }}/>);
      } else if(cur_b){
        bands.push(<div key={"b"+i} style={{
          position:"absolute",left:0,right:0,
          top:i*stepH,height:stepH-GAP,
          background:"rgba(0,0,0,0.15)",
          borderRadius:2,pointerEvents:"none",zIndex:0,
        }}/>);
      }
    }
    // 中央クリック列（拍区切り目印）
    var beatCells=[];
    for(var j=0;j<SPB;j++){
      var ss=barIdx*SPB+j;
      var jbs=j===0;
      var jb=(subdiv==="16th"?j%4===0:j%3===0)&&j!==0;
      var j8=subdiv==="16th"&&j%2===0&&j%4!==0;
      var dot=null;
      if(!jbs&&!jb&&!j8){
        // 三連の細分 or 16分の細分: 小さいドット
        dot=<div style={{width:2,height:2,borderRadius:"50%",background:"#ccc",margin:"0 auto"}}/>;
      } else if(j8){
        // 8分音符位置（16分モード）: 中くらいのドット
        dot=<div style={{width:3,height:3,borderRadius:"50%",background:"#bbb",margin:"0 auto"}}/>;
      }
      beatCells.push(
        <div key={j}
          onClick={function(s2){return function(e){e.stopPropagation();startStepRef.current=s2;setCurStep(-1);};}(ss)}
          style={{height:stepH-GAP,marginBottom:GAP,width:beatW,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",zIndex:1}}>
          {dot}
        </div>
      );
    }

    return (
      <div key={barIdx} onClick={function(b){return function(){startStepRef.current=b*SPB;setStartBar(b);setCurStep(-1);};}(barIdx)} style={{flexShrink:0,marginRight:6,background:"#fff",borderRadius:10,padding:"8px",cursor:"pointer",boxShadow:isStart?"0 4px 16px rgba(0,0,0,0.25)":"0 1px 4px rgba(0,0,0,0.08)",border:"1px solid #e8e8e8"}}>
        {/* 小節番号 */}
        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
          <div onClick={function(b){return function(){startStepRef.current=b*SPB;setStartBar(b);setCurStep(-1);};}(barIdx)}
            style={{width:18,height:18,borderRadius:"50%",flexShrink:0,
              background:isStart?"#E74C3C":"#a8a5a0",
              color:"#fff",fontSize:10,fontWeight:700,
              display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            {barIdx+1}
          </div>
          <div style={{fontSize:8,color:"#888"}}>小節</div>
        </div>
        {/* 色見本（編集モードのみ） */}
        {canEdit&&(
          <div style={{display:"flex",gap:0,marginBottom:2}}>
            <div style={{display:"flex"}}>
              {COLORS.map(function(c){return <div key={c} style={{width:CELL,height:5,background:SCORE_DOT_COLORS[c],borderRadius:1,marginRight:GAP}}/>;  })}
            </div>
            <div style={{width:beatW,flexShrink:0}}/>
            <div style={{display:"flex"}}>
              {COLORS.map(function(c){return <div key={c+"r"} style={{width:CELL,height:5,background:SCORE_DOT_COLORS[c],borderRadius:1,marginRight:GAP}}/>;  })}
            </div>
          </div>
        )}
        {/* グリッド本体: position:relativeで帯を後ろに */}
        <div style={{position:"relative",width:totalW,height:SPB*stepH}}>
          {/* 帯（後ろ） */}
          {bands}
          {/* 左手 */}
          <div style={{position:"absolute",left:0,top:0,zIndex:1}}>
            {renderSideGrid(barIdx,"left")}
          </div>
          {/* 中央クリック列 */}
          <div style={{position:"absolute",left:sideW,top:0,width:beatW,zIndex:1}}>
            {beatCells}
          </div>
          {/* 右手 */}
          <div style={{position:"absolute",left:sideW+beatW,top:0,zIndex:1}}>
            {renderSideGrid(barIdx,"right")}
          </div>
        </div>
      </div>
    );
  }

  var numBars = Math.max(2, Math.min(parseInt(bars)||8, 32));
  var TOTAL = SPB * numBars;
  // 上段: 奇数インデックス(0,2,4...) 下段: 偶数インデックス(1,3,5...)
  var topBars=[], botBars=[];
  for(var bi=0;bi<numBars;bi++){
    if(bi%2===0) topBars.push(bi);
    else botBars.push(bi);
  }
  var gridH=SPB*(CELL+GAP);
  var headerH=18+2+5+2; // 小節番号+margin+色見本+margin

  // 2台目グリッドの計算（instrument2がある時）
  var grid2Element = null;
  var grid2EditElement = null;
  var renderBar2Edit = null;
  if(instrument2) {
    var DOTS_2=instrument2==="arcane"?SCORE_DOTS_HIBIKI:(scale==="dreamy"?SCORE_DOTS_DREAMY:SCORE_DOTS_FUNENONE);
    var pat2={left:left2,right:right2};
    var numBars2=Math.max(2,Math.min(parseInt(bars)||8,32));
    var topBars2=[],botBars2=[];
    for(var bi2=0;bi2<numBars2;bi2++){if(bi2%2===0)topBars2.push(bi2);else botBars2.push(bi2);}
    var renderBar2=function(barIdx){
      var cells2=[];
      for(var i2=0;i2<SPB;i2++){
        var s2=barIdx*SPB+i2;
        var fc2=[],fc2R=[];
        for(var ci=0;ci<COLORS2.length;ci++){
          if(pat2.left[COLORS2[ci]]&&pat2.left[COLORS2[ci]][s2]) fc2.push(COLORS2[ci]);
          if(pat2.right[COLORS2[ci]]&&pat2.right[COLORS2[ci]][s2]) fc2R.push(COLORS2[ci]);
        }
        var ibs2=i2===0,ib2=subdiv==="16th"?i2%4===0:i2%3===0,i8b=subdiv==="16th"&&i2%2===0&&i2%4!==0;
        var bg2=ibs2?"rgba(0,0,0,0.1)":ib2?"rgba(0,0,0,0.05)":"transparent";
        var lBg2=fc2.length===0?"#e8e6e2":fc2.length===1?DOT_COLORS2[fc2[0]]:"linear-gradient(to bottom,"+DOT_COLORS2[fc2[0]]+" 50%,"+DOT_COLORS2[fc2[1]]+" 50%)";
        var rBg2=fc2R.length===0?"#e8e6e2":fc2R.length===1?DOT_COLORS2[fc2R[0]]:"linear-gradient(to bottom,"+DOT_COLORS2[fc2R[0]]+" 50%,"+DOT_COLORS2[fc2R[1]]+" 50%)";
        cells2.push(
          <div key={i2} style={{display:"flex",height:(CELL+GAP)+"px",alignItems:"center",background:bg2}}>
            <div style={{width:CELL,height:CELL-1,background:lBg2,borderRadius:2}}/>
            <div style={{width:14,display:"flex",alignItems:"center",justifyContent:"center"}}>{i8b&&<div style={{width:3,height:3,borderRadius:"50%",background:"#ccc"}}/>}</div>
            <div style={{width:CELL,height:CELL-1,background:rBg2,borderRadius:2}}/>
          </div>
        );
      }
      return (
        <div key={barIdx} onClick={function(b){return function(){startStepRef.current=b*SPB;setStartBar(b);setCurStep(-1);};}(barIdx)}
          style={{flexShrink:0,marginRight:6,background:"#fff",borderRadius:10,padding:"8px",cursor:"pointer",
            boxShadow:startBar===barIdx?"0 4px 16px rgba(0,0,0,0.25)":"0 1px 4px rgba(0,0,0,0.08)",border:"1px solid #e8e8e8"}}>
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
            <div style={{width:18,height:18,borderRadius:"50%",background:startBar===barIdx?"#E74C3C":"#a8a5a0",color:"#fff",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{barIdx+1}</div>
          </div>
          {cells2}
        </div>
      );
    };
    grid2Element = (
      <div>
        <div style={{display:"flex",gap:2,marginBottom:10}}>{topBars2.map(function(b){return renderBar2(b);})}</div>
        <div style={{display:"flex",gap:2}}>{botBars2.map(function(b){return renderBar2(b);})}</div>
      </div>
    );
    // 編集用2台目グリッド
    var renderBar2Edit=function(barIdx){
      var nCols2=COLORS2.length;
      var sideW2=nCols2*(CELL+GAP);
      var beatW2=14;
      var totalW2=sideW2+beatW2+sideW2;
      var stepH2=CELL+GAP;
      // 拍子帯
      var bands2=[];
      for(var i2b=0;i2b<SPB;i2b++){
        var ibs2b=i2b===0;
        var ib2b=(subdiv==="16th"?i2b%4===0:i2b%3===0)&&i2b!==0;
        if(ibs2b||ib2b){
          bands2.push(<div key={"b2"+i2b} style={{position:"absolute",left:0,right:0,top:i2b*stepH2,height:stepH2-GAP,
            background:ibs2b?"rgba(0,0,0,0.12)":"rgba(0,0,0,0.05)",borderRadius:2,pointerEvents:"none"}}/>);
        }
      }
      // 拍子点
      var beatCells2=[];
      for(var i2c=0;i2c<SPB;i2c++){
        var i8_2=subdiv==="16th"&&i2c%2===0&&i2c%4!==0;
        beatCells2.push(<div key={i2c} style={{width:beatW2,height:stepH2,display:"flex",alignItems:"center",justifyContent:"center"}}>
          {i8_2&&<div style={{width:3,height:3,borderRadius:"50%",background:"#ccc"}}/>}
        </div>);
      }
      return (
        <div key={barIdx} onClick={function(b){return function(){startStepRef.current=b*SPB;setStartBar(b);setCurStep(-1);};}(barIdx)}
          style={{flexShrink:0,background:"#fff",borderRadius:10,padding:"8px",cursor:"pointer",
          boxShadow:startBar===barIdx?"0 4px 16px rgba(0,0,0,0.25)":"0 1px 4px rgba(0,0,0,0.08)",
          border:"1px solid #e8e8e8"}}>
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
            <div style={{width:18,height:18,borderRadius:"50%",
              background:startBar===barIdx?"#E74C3C":"#a8a5a0",
              color:"#fff",fontSize:10,fontWeight:700,
              display:"flex",alignItems:"center",justifyContent:"center"}}>{barIdx+1}</div>
          </div>
          <div style={{position:"relative",width:totalW2,height:SPB*stepH2}}>
            {bands2}
            <div style={{position:"absolute",left:0,top:0,zIndex:1}}>
              {renderSideGrid2(barIdx,"left")}
            </div>
            <div style={{position:"absolute",left:sideW2,top:0,width:beatW2,zIndex:1}}>
              <div style={{display:"flex",flexDirection:"column"}}>{beatCells2}</div>
            </div>
            <div style={{position:"absolute",left:sideW2+beatW2,top:0,zIndex:1}}>
              {renderSideGrid2(barIdx,"right")}
            </div>
          </div>
        </div>
      );
    };
    grid2EditElement = (
      <div>
        <div style={{display:"inline-flex",gap:4,marginBottom:10}}>
          {topBars2.map(function(b){return renderBar2Edit(b);})}
        </div>
        <br/>
        <div style={{display:"inline-flex",gap:4}}>
          {botBars2.map(function(b){return renderBar2Edit(b);})}
        </div>
      </div>
    );
  }

  return (
    <div style={{fontFamily:"'Noto Sans JP',sans-serif",padding:"0 0 16px",overflow:"visible"}}>

      {/* セクション情報 + 開始時間 */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:8,gap:2}}>
        <p style={{fontSize:16,fontWeight:700,color:C.label,margin:0}}>{sectionLabel}</p>
        {!canEdit&&secTime&&(
          <p style={{fontSize:11,color:C.label,margin:0,opacity:0.7}}>{secTime}〜</p>
        )}
        {canEdit?(
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:10,color:C.label}}>開始時間</span>
            <input type="text" placeholder="0:05〜" value={secTime}
              onChange={function(e){setSecTime(e.target.value);if(onStartTimeChange)onStartTimeChange(e.target.value);}}
              style={{width:60,padding:"2px 6px",borderRadius:6,border:"0.5px solid #d0cec8",fontSize:11,fontFamily:"inherit",color:C.choco}}/>
          </div>
        ):(secTime?<p style={{fontSize:10,color:C.label}}>{secTime}</p>:null)}
      </div>

      {/* 小節数・繰り返し・拍子 */}
      {canEdit ? (
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap",
          padding:"6px 10px",background:"#f5f5f3",borderRadius:8,border:"0.5px solid #d0cec8"}}>
          <span style={{fontSize:10,color:C.label,fontWeight:600}}>{subdiv==="16th"?"16分音符":"三連符"}</span>
          <span style={{width:1,height:16,background:"#d0cec8",flexShrink:0}}/>
          <span style={{fontSize:10,color:C.label,fontWeight:600}}>構成</span>
          <input type="number" min="1" max="64" value={bars}
            onChange={function(e){setBars(e.target.value);}}
            style={{width:36,padding:"2px 4px",borderRadius:6,border:"0.5px solid #d0cec8",fontSize:11,textAlign:"center",fontFamily:"inherit",color:C.choco}}/>
          <span style={{fontSize:10,color:C.label}}>小節</span>
          <span style={{fontSize:10,color:C.label}}>×</span>
          <input type="number" min="1" max="20" value={repeat}
            onChange={function(e){setRepeat(e.target.value);}}
            style={{width:36,padding:"2px 4px",borderRadius:6,border:"0.5px solid #d0cec8",fontSize:11,textAlign:"center",fontFamily:"inherit",color:C.choco}}/>
          <span style={{fontSize:10,color:C.label}}>回</span>
        </div>
      ) : (
        (bars||repeat) ? (
          <p style={{fontSize:11,color:C.label,textAlign:"center",marginBottom:8}}>
            {bars}小節 × {repeat}回
          </p>
        ) : null
      )}

      {canEdit&&(
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
          <button onClick={handleSave} disabled={saving}
            style={{padding:"6px 16px",borderRadius:8,border:"none",background:saving?"#aaa":"linear-gradient(135deg,#b8c86a,#8a9a3a)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            {saving?"保存中…":"💾 保存"}
          </button>
          {saveMsg&&<span style={{fontSize:11,color:saveMsg.startsWith("✅")?C.olive:"#a04030"}}>{saveMsg}</span>}
        </div>
      )}

      <div style={{position:"sticky",top:0,zIndex:20,background:"rgba(245,245,243,0.97)",
        backdropFilter:"blur(4px)",paddingTop:8,paddingBottom:4,marginBottom:4,
        borderBottom:"1px solid #e8e8e8",marginLeft:-16,marginRight:-16,paddingLeft:16,paddingRight:16}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,flexWrap:"wrap"}}>
        <button onClick={function(){ if(onQueueStart) onQueueStart(); handlePlay(); }}
          style={{width:36,height:36,borderRadius:"50%",border:"0.5px solid #d0cec8",background:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {playing?"⏸":"▶"}
        </button>
        <div style={{display:"flex",alignItems:"center",gap:6,flex:1,minWidth:120}}>
          <span style={{fontSize:10,color:C.label,whiteSpace:"nowrap"}}>BPM</span>
          <input type="range" min="40" max="200" value={bpm} onChange={function(e){handleBpm(+e.target.value);}}
            style={{flex:1,WebkitAppearance:"none",appearance:"none",height:4,background:"#d0cec8",borderRadius:2}}/>
          <span style={{fontSize:11,fontWeight:700,color:C.choco,minWidth:34}}>{bpm}</span>
        </div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"6px 8px",border:"0.5px solid #d0cec8",borderRadius:8,background:"#f5f5f3",flexWrap:"wrap"}}>
        {!canEdit&&scoreId==="iridescence"&&(
          <div style={{display:"flex",alignItems:"center",gap:6,marginRight:8}}>
            <span style={{fontSize:10,color:C.label,fontWeight:600}}>音階</span>
            <button onClick={function(){setSoundType("enigma");actxRef.current=null;bufsRef.current={};}}
              style={{padding:"2px 8px",borderRadius:6,border:"0.5px solid #d0cec8",
                background:soundType==="enigma"?"#708238":"#fff",color:soundType==="enigma"?"#fff":C.label,
                fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
              秘ノ音
            </button>
            <button onClick={function(){setSoundType("arcane");actxRef.current=null;bufsRef.current={};}}
              style={{padding:"2px 8px",borderRadius:6,border:"0.5px solid #d0cec8",
                background:soundType==="arcane"?"#708238":"#fff",color:soundType==="arcane"?"#fff":C.label,
                fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
              響ノ音
            </button>
          </div>
        )}
        <span style={{fontSize:10,fontWeight:700,color:C.label}}>METRO</span>
        <div onClick={function(){setMetroOn(function(v){return !v;});}} style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",userSelect:"none"}}>
          {Sw(metroOn)}<span style={{fontSize:10,color:C.label}}>{metroOn?"ON":"OFF"}</span>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {(subdiv==="16th"
            ?[["4分",4],["8分",8],["裏","8u"]]
            :[["4分",4],["三連",3]]
          ).map(function(x){
            return <button key={x[1]} onClick={function(){setMetroMode(x[1]);}}
              style={{padding:"3px 7px",borderRadius:6,border:"0.5px solid #d0cec8",background:metroMode===x[1]?"#1a1a1a":"#fff",color:metroMode===x[1]?"#fff":"#666",fontSize:9,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>♩ {x[0]}</button>;
          })}
        </div>
        <div onClick={function(){setMetroAccent(function(v){return !v;});}} style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",userSelect:"none"}}>
          {Sw(metroAccent)}<span style={{fontSize:10,color:C.label}}>頭チーン</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:10,color:C.label}}>音量</span>
          <input type="range" min="0" max="100" value={Math.round(metroVol*100)} onChange={function(e){setMetroVol(e.target.value/100);}}
            style={{width:60,WebkitAppearance:"none",appearance:"none",height:4,background:"#d0cec8",borderRadius:2}}/>
        </div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"5px 8px",border:"0.5px solid #d0cec8",borderRadius:8,background:"#f5f5f3"}}>
        <span style={{fontSize:10,fontWeight:700,color:C.label}}>左右表示</span>
        <div onClick={function(){setLrOn(function(v){return !v;});}} style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",userSelect:"none"}}>
          {Sw(lrOn)}<span style={{fontSize:10,color:C.label}}>{lrOn?"ON":"OFF"}</span>
        </div>
      </div>
      </div>

      {canEdit ? (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",justifyContent:"center",gap:32,alignItems:"flex-start",marginBottom:8}}>
            {/* 響ノ音を先に表示 */}
            {instrument2&&(
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:11,color:C.label,marginBottom:4,fontWeight:600}}>響ノ音</div>
                <svg viewBox="0 0 140 166" width="140" height="166">
                  <circle cx="70" cy="83" r="67" fill="#f8f8f8" stroke="#e8e8e8" strokeWidth="1"/>
                  <text x="70" y="10" textAnchor="middle" fontSize="10" fontFamily="sans-serif" fill="#999">低音</text>
                  <text x="70" y="162" textAnchor="middle" fontSize="10" fontFamily="sans-serif" fill="#999">高音</text>
                  {(function(){
                    var used2e={};
                    COLORS2.forEach(function(c){
                      for(var i=0;i<numBars*SPB;i++){
                        if((left2[c]&&left2[c][i])||(right2[c]&&right2[c][i])){ used2e[c]=true; break; }
                      }
                    });
                    return Object.keys(SCORE_DOTS_HIBIKI).map(function(color){
                      var pos=SCORE_DOTS_HIBIKI[color];

  async function gasRead(params) {
    return new Promise(function(resolve, reject) {
      var cbName = "gasCb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
      window[cbName] = function(data) {
        delete window[cbName];
        var el = document.getElementById(cbName);
        if(el) el.remove();
        resolve(data);
      };
      var script = document.createElement("script");
      script.id = cbName;
      var urlParams = new URLSearchParams(params);
      urlParams.set("callback", cbName);
      script.src = "https://script.google.com/macros/s/AKfycbzQ6S3HLtRTvNgv4XBT07LHTkjEcGoXqvXmIGkmXV4IJhFYmU5dq5DLHWtQlh1aHQJoAg/exec?" + urlParams.toString();
      script.onerror = function() {
        delete window[cbName];
        script.remove();
        reject(new Error("GAS request failed"));
      };
      document.body.appendChild(script);
      setTimeout(function() {
        if(window[cbName]) {
          delete window[cbName];
          var el = document.getElementById(cbName);
          if(el) el.remove();
          reject(new Error("GAS timeout"));
        }
      }, 15000);
    });
  }

  async function loadScorePatterns(scoreId) {
    // 既にキャッシュがあればスキップ
    if(scorePatterns[scoreId] && Object.keys(scorePatterns[scoreId]).length > 0) return;
    setScoreLoading(true);
    try {
      const res = await gasRead({ action:"getscores", score_id:scoreId });
      const rows = res.rows || [];
      const patterns = {};
      rows.forEach(function(r) {
        if(!patterns[r.section]) patterns[r.section] = { left:{}, right:{}, meta:{} };
        if(r.hand === "meta") {
          patterns[r.section].meta[r.color] = r.pattern;
        } else {
          try { patterns[r.section][r.hand][r.color] = JSON.parse(r.pattern); } catch(e) {}
        }
      });
      setScorePatterns(function(prev){
        return Object.assign({}, prev, {[scoreId]: patterns});
      });
    } catch(e) { console.warn("loadScorePatterns error:", e); }
    setScoreLoading(false);
  }

  async function saveScorePattern(scoreId, section, left, right, meta, left2, right2) {
    var colors = ["orange","red","lime","green","yellow","purple","cyan","pink","brown"];
    var colors2 = ["turquoise","steelgray","salmon","royalblue","gold","emerald","charcoal","sage","plum"];
    // 現在のスプシデータと比較して変更があるものだけ送る
    var existing = (scorePatterns[scoreId]||{})[section]||{};
    var calls = [];
    colors.forEach(function(color) {
      var newL = JSON.stringify(left[color]||[]);
      var newR = JSON.stringify(right[color]||[]);
      var oldL = JSON.stringify((existing.left&&existing.left[color])||[]);
      var oldR = JSON.stringify((existing.right&&existing.right[color])||[]);
      if(newL !== oldL) calls.push({hand:"left", color:color, pattern:newL});
      if(newR !== oldR) calls.push({hand:"right", color:color, pattern:newR});
    });
    // 2台目（instrument2）のデータ
    if(left2 && right2) {
      colors2.forEach(function(color) {
        var newL2 = JSON.stringify(left2[color]||[]);
        var newR2 = JSON.stringify(right2[color]||[]);
        var oldL2 = JSON.stringify((existing.left2&&existing.left2[color])||[]);
        var oldR2 = JSON.stringify((existing.right2&&existing.right2[color])||[]);
        if(newL2 !== oldL2) calls.push({hand:"left2", color:color, pattern:newL2});
        if(newR2 !== oldR2) calls.push({hand:"right2", color:color, pattern:newR2});
      });
    }
    // meta
    var oldMeta = existing.meta||{};
    if(meta) {
      if(String(meta.bars||"8") !== String(oldMeta.bars||"8")) calls.push({hand:"meta",color:"bars",pattern:String(meta.bars||"8")});
      if(String(meta.repeat||"1") !== String(oldMeta.repeat||"1")) calls.push({hand:"meta",color:"repeat",pattern:String(meta.repeat||"1")});
      if(String(meta.startTime||"") !== String(oldMeta.startTime||"")) calls.push({hand:"meta",color:"startTime",pattern:String(meta.startTime||"")});
    }
    console.log("保存する変更:", calls.length, "件");
    for(var i=0;i<calls.length;i++){
      var c=calls[i];
      await gasRead({action:"savescore",score_id:scoreId,section:section,hand:c.hand,color:c.color,pattern:c.pattern});
    }
    // ローカルのscorePatternsも更新
    var updated = JSON.parse(JSON.stringify(existing));
    if(!updated.left) updated.left={};
    if(!updated.right) updated.right={};
    if(!updated.meta) updated.meta={};
    colors.forEach(function(color){
      updated.left[color]=(left[color]||[]).slice();
      updated.right[color]=(right[color]||[]).slice();
    });
    if(meta){updated.meta.bars=meta.bars;updated.meta.repeat=meta.repeat;updated.meta.startTime=meta.startTime;updated.meta.noteType=meta.noteType;updated.meta.subdiv=meta.noteType;}
    setScorePatterns(function(prev){var n=Object.assign({},prev);n[scoreId]=Object.assign({},prev[scoreId]);n[scoreId][section]=updated;return n;});
  }

  async function gasWrite(params) {
    // 短いリクエストはGET、長いものはPOSTで送る
    const query = new URLSearchParams(params).toString();
    if (query.length < 1500) {
      const res = await fetch("/api/gas?" + query);
      return await res.json();
    } else {
      const res = await fetch("/api/gas", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(params)
      });
      return await res.json();
    }
  }

                  {scoreList.map(id=>(
                    <button key={id} onClick={()=>{setCurrentScoreId(id); loadScorePatterns(id);}}
                      style={{padding:"4px 12px",borderRadius:8,border:"0.5px solid "+C.border,background:currentScoreId===id?"#4B3621":"#fff",color:currentScoreId===id?"#fff":C.label,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                      {SCORE_ID_TO_NAME[id]||id}
                    </button>
                  ))}
                  <div style={{marginLeft:"auto",display:"flex",gap:4,flexShrink:0}}>
                    <button onClick={function(){
                      var sections=SCORE_SECTIONS[currentScoreId]||SCORE_SECTIONS.waterlily;
                      var cur=sections.find(function(s){return s[0]===scoreSection;});
                      var nt=cur?cur[2]:"triplet";
                      var pd=(scorePatterns[currentScoreId]||{})[scoreSection];
                      var lbl=cur?cur[1]:scoreSection;
                      printSection(currentScoreId,scoreSection,lbl,nt,pd,scorePatterns[currentScoreId]||{});
                    }} style={{padding:"3px 10px",borderRadius:8,border:"0.5px solid #d0cec8",background:"#f5f5f3",color:"#555",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                      印刷（この）
                    </button>
                    <button onClick={function(){
                      printAllSections(currentScoreId,scorePatterns[currentScoreId]||{});
                    }} style={{padding:"3px 10px",borderRadius:8,border:"0.5px solid #d0cec8",background:"#f5f5f3",color:"#555",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                      印刷（全）
                    </button>
                  </div>
                </div>
                {/* セクション選択 */}
                <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                  {/* 全選択ボタン */}
                  <div style={{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                    <button onClick={function(){
                      var all=(SCORE_SECTIONS[currentScoreId]||SCORE_SECTIONS.waterlily).map(function(s){return s[0];});
                      setSelectedSecs(all);
                    }} style={{padding:"3px 10px",borderRadius:8,border:"0.5px solid "+C.border,background:"#f5f5f3",color:C.label,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>全選択</button>
                    <button onClick={function(){setSelectedSecs([]);}}
                      style={{padding:"3px 10px",borderRadius:8,border:"0.5px solid "+C.border,background:"#f5f5f3",color:C.label,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>解除</button>
                  </div>
                  {(SCORE_SECTIONS[currentScoreId]||SCORE_SECTIONS.waterlily).map(([key,lbl])=>(
                    <button key={key} onClick={function(){
                      setSelectedSecs(function(prev){
                        if(prev.includes(key)){
                          // 解除：表示セクションを別のに切り替え
                          var next=prev.filter(function(k){return k!==key;});
                          if(scoreSection===key && next.length>0) setScoreSection(next[next.length-1]);
                          return next;
                        } else {
                          setScoreSection(key);
                          return [].concat(prev,[key]);
                        }
                      });
                    }}
                      style={{padding:"4px 12px",borderRadius:8,
                        border:selectedSecs.includes(key)?"2px solid #708238":"0.5px solid "+C.border,
                        background:scoreSection===key?"#708238":selectedSecs.includes(key)?"rgba(112,130,56,0.15)":"#fff",
                        color:scoreSection===key?"#fff":C.label,
                        fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                      {lbl}
                    </button>
                  ))}
                </div>
                <ScorePlayer
                  key={(function(){
                    var sec = SCORE_SECTIONS[currentScoreId]||SCORE_SECTIONS.waterlily;
                    var cur = sec.find(function(s){return s[0]===scoreSection;});
                    var subdiv = cur?cur[2]:"triplet";
                    return currentScoreId+"-"+subdiv;
                  })()}
                  scoreId={currentScoreId}
                  sectionKey={scoreSection}
                  sectionLabel={(SCORE_SECTIONS[currentScoreId]||SCORE_SECTIONS.waterlily).find(function(x){return x[0]===scoreSection;})?.[1]||scoreSection}
                  patternData={(scorePatterns[currentScoreId]||{})[scoreSection]}
                  canEdit={false}
                  scoreLoading={scoreLoading}
                  scale={(currentScoreId==="dreamy"||currentScoreId==="iridescence"||currentScoreId==="aoi"||currentScoreId==="megumi")?"dreamy":"funenone"}
                  instrument2={currentScoreId==="megumi"?"arcane":null}
                  patternData2={currentScoreId==="megumi"?{left:((scorePatterns["megumi"]||{})[scoreSection]||{}).left2||{},right:((scorePatterns["megumi"]||{})[scoreSection]||{}).right2||{}}:null}
                  isQueuePlaying={isQueuePlay}
                  autoPlay={isQueuePlay}
                  onLoopComplete={isQueuePlay?function(){
                    var nextIdx=playQueueIdxRef.current+1;
                    if(nextIdx<playQueueRef.current.length){
                      playQueueIdxRef.current=nextIdx;
                      setScoreSection(playQueueRef.current[nextIdx]);
                      return true;
                    } else {
                      playQueueIdxRef.current=0;
                      isQueuePlayRef.current=false;
                      setIsQueuePlay(false);
                      return false;
                    }
                  }:null}
                  sharedBpm={sharedBpm}
                  onBpmChange={function(v){setSharedBpm(v);}}
                  sharedMetroOn={sharedMetroOn}
                  sharedMetroMode={sharedMetroMode}
                  onMetroChange={function(v){
                    if(v.metroOn!==undefined) setSharedMetroOn(v.metroOn);
                    if(v.metroMode!==undefined) setSharedMetroMode(v.metroMode);
                  }}
                  onPrintAll={function(){printAllSections(currentScoreId, scorePatterns[currentScoreId]||{});}}
                  onQueueStart={selectedSecs.length>0?function(){
                    var sections=(SCORE_SECTIONS[currentScoreId]||SCORE_SECTIONS.waterlily);
                    var queue=sections.filter(function(s){return selectedSecs.includes(s[0]);}).map(function(s){return s[0];});
                    playQueueRef.current=queue;
                    playQueueIdxRef.current=0;
                    isQueuePlayRef.current=true;
                    setIsQueuePlay(true);
                    setScoreSection(queue[0]);
                  }:null}

                  subdivProp={(function(){var s=(SCORE_SECTIONS[currentScoreId]||SCORE_SECTIONS.waterlily).find(function(x){return x[0]===scoreSection;});return s?s[2]:"triplet";})()}
                  onSave={saveScorePattern}
                />
              </div>
            )}
          </div>
        )}

        {/* 開発支援ボタン */}
        <a href="https://www.gudadrumjapan.com/product-page/shien" target="_blank" rel="noreferrer"
          style={{display:"block",textAlign:"center",padding:"14px",borderRadius:12,background:"linear-gradient(135deg,#e8a84a,#c87020)",color:"#fff",fontSize:14,fontWeight:700,textDecoration:"none",letterSpacing:"0.05em",boxShadow:"0 4px 12px rgba(200,112,32,0.4)",cursor:"pointer"}}>
          🌈 ポータルサイト開発支援 🌈
        </a>

        {/* フィードバックボタン */}
        <div style={{marginBottom:8}}>
          <button onClick={()=>setFeedbackOpen(!feedbackOpen)}
            style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#7aaa3a,#4a7a1a)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",textAlign:"center",boxShadow:"0 4px 12px rgba(74,122,26,0.4)",display:"block"}}>
            💬 アプリへのフィードバックを送る
          </button>
          {feedbackOpen && (
            <div style={{background:"rgba(255,255,255,0.9)",border:"1px solid "+C.border,borderRadius:12,padding:16,marginTop:8,position:"relative",zIndex:10}}>
              <p style={{fontSize:12,color:C.label,marginBottom:12,lineHeight:1.6}}>アプリの使い心地や改善のご要望などをDANiLOに直接お届けします。お気軽にどうぞ！</p>
              <input value={feedbackName} onChange={e=>setFeedbackName(e.target.value)}
                placeholder="お名前（任意）"
                style={{width:"100%",boxSizing:"border-box",background:"#fff",border:"1px solid "+C.border,borderRadius:8,padding:"8px 10px",fontSize:13,color:C.choco,marginBottom:8,display:"block"}}/>
              <textarea value={feedbackMsg} onChange={e=>setFeedbackMsg(e.target.value)}
                placeholder="フィードバック内容をご記入ください"
                style={{width:"100%",boxSizing:"border-box",background:"#fff",border:"1px solid "+C.border,borderRadius:8,padding:"8px 10px",fontSize:13,color:C.choco,resize:"none",height:100,marginBottom:8,display:"block"}}/>
              {feedbackStatus && <p style={{fontSize:12,color:feedbackStatus.startsWith("✅")?C.olive:"#a04030",marginBottom:8}}>{feedbackStatus}</p>}
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setFeedbackOpen(false);setFeedbackStatus(""); setFeedbackMsg(""); setFeedbackName("");}}
                  style={{flex:1,padding:"10px",borderRadius:8,border:"1px solid "+C.border,background:"#fff",color:C.label,fontSize:13,cursor:"pointer",fontWeight:600}}>キャンセル</button>
                <button onClick={()=>{
                  if (!feedbackMsg.trim()) { setFeedbackStatus("内容を入力してください"); return; }
                  setFeedbackStatus("送信中...");
                  gasWrite({action:"feedback", name:feedbackName||"匿名", message:feedbackMsg})
                    .then(d=>{
                      if (d.success) { setFeedbackStatus("✅ 送信しました！"); setFeedbackMsg(""); setTimeout(()=>{setFeedbackOpen(false);setFeedbackStatus("");},2000); }
                      else { setFeedbackStatus("❌ "+(d.error||"エラー")); }
                    })
                    .catch(e=>setFeedbackStatus("❌ "+e.message));
                }}
                  style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#b8c86a,#8a9a3a)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>送信する</button>
              </div>
            </div>
          )}
        </div>

        {/* サブスク中止ボタン（サブスクメンバーのみ表示） */}
        {m.subscType && m.subscType !== "" && (
          <div style={{marginBottom:16}}>
            {!cancelSubsConfirm ? (
              <button onClick={()=>setCancelSubsConfirm(true)}
                style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#888,#555)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",textAlign:"center",boxShadow:"0 4px 12px rgba(80,80,80,0.4)"}}>
                サブスクを中止する
              </button>
            ) : (
              <div style={{background:"rgba(255,255,255,0.9)",border:"1px solid #ccc",borderRadius:12,padding:16}}>
                <p style={{fontSize:13,color:C.choco,fontWeight:600,marginBottom:8,textAlign:"center"}}>本当に中止しますか？</p>
                <p style={{fontSize:11,color:C.label,marginBottom:12,textAlign:"center",lineHeight:1.6}}>中止のリクエストがDANiLOに送信されます。</p>
                {cancelSubsMsg && <p style={{fontSize:12,color:cancelSubsMsg.startsWith("✅")?C.olive:"#a04030",marginBottom:8,textAlign:"center"}}>{cancelSubsMsg}</p>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setCancelSubsConfirm(false)}
                    style={{flex:1,padding:"8px",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.label,fontSize:12,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={()=>{
                    gasWrite({action:"cancelsubs", name:m.name, subsType:m.subscType}).then(()=>{
                      setCancelSubsMsg("✅ DANiLOに送信しました。");
                      setTimeout(()=>{setCancelSubsConfirm(false);setCancelSubsMsg("");},2000);
                    }).catch(()=>setCancelSubsMsg("❌ 送信に失敗しました"));
                  }}
                    style={{flex:1,padding:"8px",borderRadius:8,border:"1px solid #aaa",background:"rgba(150,150,150,0.2)",color:"#666",fontSize:12,fontWeight:700,cursor:"pointer"}}>はい</button>
                </div>
              </div>
            )}
          </div>
        )}



      </div>
    </div>
  );
}

    ReactDOM.render(React.createElement(App), document.getElementById('root'));
  </script>
</body>
</html>
